# Visual review with Chromatic — builds Storybook on every PR and pushes
# the snapshots to Chromatic. Reviewers see a per-component visual diff
# alongside the code review.
#
# One-time setup:
#   1. Sign up at https://www.chromatic.com and link this repo
#   2. Add CHROMATIC_PROJECT_TOKEN to GitHub repo secrets
#      (Settings → Secrets and variables → Actions)
#   3. Push any PR to trigger the first build
#
# Until the token is set the workflow runs but uploads will fail
# gracefully — the PR check is non-blocking via `exitZeroOnChanges`.

name: Chromatic

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  visual-review:
    runs-on: ubuntu-latest
    # Skip if the token isn't configured. Lets the workflow exist without
    # red-X'ing every PR until the user wires up the secret.
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          # Chromatic needs full history to compute baselines between commits.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Skip if no Chromatic token
        if: env.CHROMATIC_PROJECT_TOKEN == ''
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: |
          echo "::warning::CHROMATIC_PROJECT_TOKEN is not set — skipping visual review."
          echo "Add the secret at Settings → Secrets and variables → Actions to enable."
          exit 0

      - name: Run Chromatic
        if: env.CHROMATIC_PROJECT_TOKEN != ''
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        # exitZeroOnChanges: PRs with visual changes don't fail CI — they
        #   surface the diff as a Chromatic-side review.
        # onlyChanged: only re-snapshot stories whose files changed (or
        #   their dependencies). Faster builds on incremental PRs.
        run: npx chromatic --exit-zero-on-changes --only-changed
